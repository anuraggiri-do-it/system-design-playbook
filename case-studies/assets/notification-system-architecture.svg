<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="820" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#82b366"/>
    </marker>
    <marker id="arrYellow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d6b656"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9673a6"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b85450"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1260" height="820" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="630" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Notification System — System Design (Alex Xu, System Design Interview Ch.10)</text>

  <!-- ══════════════════════════════════════════════
       COL 1 — SERVICES (x=30)
  ══════════════════════════════════════════════ -->
  <rect x="30" y="55" width="150" height="310" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="105" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Services</text>
  <text x="105" y="88" text-anchor="middle" font-size="10" fill="#666">(Producers)</text>

  <rect x="50" y="100" width="110" height="38" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="105" y="124" text-anchor="middle" font-size="11" fill="#1a1a2e">Service 1</text>

  <rect x="50" y="152" width="110" height="38" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="105" y="176" text-anchor="middle" font-size="11" fill="#1a1a2e">Service 2</text>

  <rect x="50" y="204" width="110" height="38" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="105" y="228" text-anchor="middle" font-size="11" fill="#1a1a2e">Service 3</text>

  <text x="105" y="268" text-anchor="middle" font-size="18" fill="#aaa">⋮</text>

  <rect x="50" y="290" width="110" height="38" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="105" y="314" text-anchor="middle" font-size="11" fill="#1a1a2e">Service N</text>

  <!-- ══════════════════════════════════════════════
       COL 2 — NOTIFICATION SERVICE (x=240)
  ══════════════════════════════════════════════ -->
  <rect x="230" y="90" width="190" height="130" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="325" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Notification Service</text>
  <text x="325" y="132" text-anchor="middle" font-size="10" fill="#333">• Validates request</text>
  <text x="325" y="148" text-anchor="middle" font-size="10" fill="#333">• Fetches user settings</text>
  <text x="325" y="164" text-anchor="middle" font-size="10" fill="#333">• Builds payload</text>
  <text x="325" y="180" text-anchor="middle" font-size="10" fill="#333">• Sends to correct queue</text>
  <text x="325" y="196" text-anchor="middle" font-size="10" fill="#333">• Checks opt-out / rate limit</text>

  <!-- User Info DB (cylinder) -->
  <ellipse cx="325" cy="285" rx="90" ry="12" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <rect x="235" y="285" width="180" height="65" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <ellipse cx="325" cy="350" rx="90" ry="12" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="325" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">User Info DB</text>
  <text x="325" y="332" text-anchor="middle" font-size="10" fill="#555">device tokens, email,</text>
  <text x="325" y="347" text-anchor="middle" font-size="10" fill="#555">phone, preferences</text>

  <!-- Cache (Redis) -->
  <rect x="230" y="430" width="190" height="65" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="325" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Cache (Redis)</text>
  <text x="325" y="469" text-anchor="middle" font-size="10" fill="#555">user settings + device tokens</text>
  <text x="325" y="484" text-anchor="middle" font-size="10" fill="#555">reduces DB hits</text>

  <!-- ══════════════════════════════════════════════
       COL 3 — MESSAGE QUEUES (x=490)
  ══════════════════════════════════════════════ -->
  <rect x="490" y="55" width="190" height="310" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="585" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Message Queues</text>
  <text x="585" y="91" text-anchor="middle" font-size="9" fill="#666">decouples senders from workers</text>

  <rect x="510" y="105" width="150" height="34" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="585" y="127" text-anchor="middle" font-size="11" fill="#1a1a2e">iOS Queue</text>

  <rect x="510" y="153" width="150" height="34" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="585" y="175" text-anchor="middle" font-size="11" fill="#1a1a2e">Android Queue</text>

  <rect x="510" y="201" width="150" height="34" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="585" y="223" text-anchor="middle" font-size="11" fill="#1a1a2e">SMS Queue</text>

  <rect x="510" y="249" width="150" height="34" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="585" y="271" text-anchor="middle" font-size="11" fill="#1a1a2e">Email Queue</text>

  <text x="585" y="318" text-anchor="middle" font-size="10" font-style="italic" fill="#888">Buffers spikes</text>
  <text x="585" y="333" text-anchor="middle" font-size="10" font-style="italic" fill="#888">Retries on failure</text>

  <!-- Notification Log DB (cylinder) -->
  <ellipse cx="585" cy="435" rx="90" ry="12" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <rect x="495" y="435" width="180" height="65" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <ellipse cx="585" cy="500" rx="90" ry="12" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="585" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Notification Log DB</text>
  <text x="585" y="479" text-anchor="middle" font-size="10" fill="#555">persists every notification</text>
  <text x="585" y="495" text-anchor="middle" font-size="10" fill="#555">retry + dedup (idempotency)</text>

  <!-- ══════════════════════════════════════════════
       COL 4 — WORKERS (x=750)
  ══════════════════════════════════════════════ -->
  <rect x="750" y="55" width="175" height="310" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="837" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Workers</text>
  <text x="837" y="91" text-anchor="middle" font-size="9" fill="#666">stateless — scale horizontally</text>

  <rect x="770" y="105" width="135" height="34" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="837" y="127" text-anchor="middle" font-size="11" fill="#1a1a2e">iOS Worker</text>

  <rect x="770" y="153" width="135" height="34" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="837" y="175" text-anchor="middle" font-size="11" fill="#1a1a2e">Android Worker</text>

  <rect x="770" y="201" width="135" height="34" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="837" y="223" text-anchor="middle" font-size="11" fill="#1a1a2e">SMS Worker</text>

  <rect x="770" y="249" width="135" height="34" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="837" y="271" text-anchor="middle" font-size="11" fill="#1a1a2e">Email Worker</text>

  <!-- ══════════════════════════════════════════════
       COL 5 — THIRD-PARTY PROVIDERS (x=995)
  ══════════════════════════════════════════════ -->
  <rect x="995" y="55" width="175" height="310" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="1082" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">3rd-Party Providers</text>

  <rect x="1015" y="95" width="135" height="44" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="1082" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">APNs</text>
  <text x="1082" y="130" text-anchor="middle" font-size="10" fill="#555">(Apple Push)</text>

  <rect x="1015" y="153" width="135" height="44" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="1082" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">FCM</text>
  <text x="1082" y="188" text-anchor="middle" font-size="10" fill="#555">(Firebase / Google)</text>

  <rect x="1015" y="211" width="135" height="44" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="1082" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Twilio / Nexmo</text>
  <text x="1082" y="246" text-anchor="middle" font-size="10" fill="#555">(SMS)</text>

  <rect x="1015" y="269" width="135" height="44" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="1082" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">SendGrid</text>
  <text x="1082" y="304" text-anchor="middle" font-size="10" fill="#555">(Email)</text>

  <!-- ══════════════════════════════════════════════
       COL 6 — END USER DEVICES (x=995, y=430)
  ══════════════════════════════════════════════ -->
  <rect x="995" y="430" width="175" height="260" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="1082" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">End User Devices</text>

  <rect x="1015" y="465" width="135" height="34" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1082" y="487" text-anchor="middle" font-size="11" fill="#1a1a2e">iOS Device</text>

  <rect x="1015" y="513" width="135" height="34" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1082" y="535" text-anchor="middle" font-size="11" fill="#1a1a2e">Android Device</text>

  <rect x="1015" y="561" width="135" height="34" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1082" y="583" text-anchor="middle" font-size="11" fill="#1a1a2e">SMS / Phone</text>

  <rect x="1015" y="609" width="135" height="34" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1082" y="631" text-anchor="middle" font-size="11" fill="#1a1a2e">Email Client</text>

  <!-- ══════════════════════════════════════════════
       BOOK KEY POINTS NOTE (bottom)
  ══════════════════════════════════════════════ -->
  <rect x="30" y="580" width="440" height="175" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="600" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">📌 Book Key Points (Ch.10)</text>
  <text x="45" y="622" font-size="11" fill="#333">• Each channel has its own queue → no single point of failure</text>
  <text x="45" y="642" font-size="11" fill="#333">• Workers are stateless → scale horizontally</text>
  <text x="45" y="662" font-size="11" fill="#333">• Retry with exponential backoff on 3rd-party failure</text>
  <text x="45" y="682" font-size="11" fill="#333">• Dedup via idempotency key in Notification Log DB</text>
  <text x="45" y="702" font-size="11" fill="#333">• Rate limit per user to avoid notification spam</text>
  <text x="45" y="722" font-size="11" fill="#333">• User opt-out settings checked before enqueue</text>
  <text x="45" y="742" font-size="11" fill="#333">• Cache absorbs repeated user-settings lookups</text>

  <!-- ══════════════════════════════════════════════
       ARROWS
  ══════════════════════════════════════════════ -->

  <!-- Services → Notification Service -->
  <line x1="180" y1="210" x2="228" y2="155" stroke="#6c8ebf" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="185" y="178" font-size="10" fill="#6c8ebf">trigger</text>

  <!-- Notification Service → User Info DB -->
  <line x1="325" y1="220" x2="325" y2="272" stroke="#d6b656" stroke-width="1.5" marker-end="url(#arrYellow)"/>
  <text x="330" y="252" font-size="10" fill="#d6b656">fetch prefs</text>

  <!-- Notification Service → Cache (dashed) -->
  <line x1="325" y1="220" x2="325" y2="428" stroke="#d6b656" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrYellow)"/>
  <text x="330" y="360" font-size="10" fill="#d6b656">check cache</text>

  <!-- Notification Service → Queues -->
  <line x1="420" y1="155" x2="488" y2="210" stroke="#82b366" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="430" y="178" font-size="10" fill="#82b366">enqueue by type</text>

  <!-- Queues → Workers -->
  <line x1="680" y1="210" x2="748" y2="210" stroke="#82b366" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="690" y="204" font-size="10" fill="#82b366">pull</text>

  <!-- Workers → 3rd-Party Providers -->
  <line x1="925" y1="210" x2="993" y2="210" stroke="#9673a6" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <text x="930" y="204" font-size="10" fill="#9673a6">send via API</text>

  <!-- 3rd-Party Providers → Devices -->
  <line x1="1082" y1="365" x2="1082" y2="428" stroke="#6c8ebf" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="1087" y="402" font-size="10" fill="#6c8ebf">deliver</text>

  <!-- Workers → Notification Log DB (dashed) -->
  <polyline points="837,365 837,467 677,467" fill="none" stroke="#b85450" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrRed)"/>
  <text x="720" y="458" font-size="10" fill="#b85450">log + retry</text>

</svg>
