<svg xmlns="http://www.w3.org/2000/svg" width="900" height="920" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="920" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">URL Shortener — System Design (Alex Xu, System Design Interview)</text>

  <!-- Flow labels -->
  <rect x="60" y="50" width="340" height="22" rx="4" fill="#dae8fc"/>
  <text x="70" y="65" font-size="11" font-weight="bold" fill="#1a1a2e">① Write Flow  (POST /api/v1/data/shorten)</text>
  <rect x="60" y="76" width="300" height="22" rx="4" fill="#d5e8d4"/>
  <text x="70" y="91" font-size="11" font-weight="bold" fill="#1a1a2e">② Read Flow  (GET /api/v1/{shortUrl})</text>

  <!-- ── CLIENT ── -->
  <rect x="330" y="115" width="240" height="55" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="450" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Client / Browser</text>
  <text x="450" y="158" text-anchor="middle" font-size="10" fill="#555">POST longURL  |  GET shortURL</text>

  <!-- arrow: Client → Rate Limiter -->
  <line x1="450" y1="170" x2="450" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="455" y="193" font-size="10" fill="#555">request</text>

  <!-- ── RATE LIMITER ── -->
  <rect x="330" y="210" width="240" height="55" rx="10" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="450" y="233" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Rate Limiter</text>
  <text x="450" y="253" text-anchor="middle" font-size="10" fill="#555">blocks abusive IPs</text>

  <!-- arrow: Rate Limiter → Load Balancer -->
  <line x1="450" y1="265" x2="450" y2="303" stroke="#82b366" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="455" y="288" font-size="10" fill="#82b366">allowed</text>

  <!-- ── LOAD BALANCER ── -->
  <rect x="330" y="305" width="240" height="55" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="450" y="333" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Load Balancer</text>
  <text x="450" y="350" text-anchor="middle" font-size="10" fill="#555">distributes traffic</text>

  <!-- arrow: Load Balancer → Web Servers -->
  <line x1="450" y1="360" x2="450" y2="398" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="455" y="383" font-size="10" fill="#555">route</text>

  <!-- ── WEB SERVERS (stateless) ── -->
  <rect x="160" y="400" width="580" height="85" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="450" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Web Servers — Stateless</text>
  <rect x="185" y="428" width="180" height="40" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="275" y="453" text-anchor="middle" font-size="12" fill="#1a1a2e">Web Server 1</text>
  <rect x="555" y="428" width="160" height="40" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="635" y="453" text-anchor="middle" font-size="12" fill="#1a1a2e">Web Server 2</text>

  <!-- arrow: Web Servers → Cache -->
  <line x1="300" y1="485" x2="220" y2="558" stroke="#d6b656" stroke-width="1.5" marker-end="url(#arrYellow)"/>
  <text x="215" y="530" font-size="10" fill="#d6b656">1. lookup</text>

  <!-- arrow: Web Servers → ID Generator -->
  <line x1="600" y1="485" x2="680" y2="558" stroke="#9673a6" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <text x="620" y="530" font-size="10" fill="#9673a6">2. gen ID</text>

  <!-- arrow: Web Servers → Client (redirect, right side) -->
  <polyline points="740,442 820,442 820,142 570,142" fill="none" stroke="#b85450" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="825" y="300" font-size="10" fill="#b85450" transform="rotate(90,825,300)">301 / 302 Redirect</text>

  <!-- ── CACHE ── -->
  <rect x="80" y="560" width="220" height="75" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="190" y="583" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Cache (Redis)</text>
  <text x="190" y="600" text-anchor="middle" font-size="10" fill="#555">shortURL → longURL</text>
  <text x="190" y="616" text-anchor="middle" font-size="10" fill="#555">HIT: return  |  MISS: go to DB</text>
  <text x="190" y="630" text-anchor="middle" font-size="9" fill="#888">absorbs ~80% of reads</text>

  <!-- ── ID GENERATOR ── -->
  <rect x="590" y="560" width="220" height="75" rx="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="700" y="583" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Unique ID Generator</text>
  <text x="700" y="600" text-anchor="middle" font-size="10" fill="#555">Twitter Snowflake</text>
  <text x="700" y="616" text-anchor="middle" font-size="10" fill="#555">globally unique, time-ordered</text>

  <!-- arrow: Cache MISS → DB -->
  <line x1="190" y1="635" x2="190" y2="718" stroke="#6c8ebf" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="195" y="680" font-size="10" fill="#6c8ebf">MISS → fetch</text>

  <!-- arrow: ID Generator → Base62 -->
  <line x1="700" y1="635" x2="700" y2="718" stroke="#9673a6" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <text x="705" y="680" font-size="10" fill="#9673a6">unique ID</text>

  <!-- ── DATABASE ── -->
  <rect x="80" y="720" width="220" height="75" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <ellipse cx="190" cy="720" rx="110" ry="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="190" y="758" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Relational DB</text>
  <text x="190" y="775" text-anchor="middle" font-size="10" fill="#555">id | shortURL | longURL</text>
  <text x="190" y="790" text-anchor="middle" font-size="9" fill="#888">MySQL / PostgreSQL</text>

  <!-- ── BASE62 ENCODER ── -->
  <rect x="590" y="720" width="220" height="75" rx="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="700" y="748" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Base62 Encoder</text>
  <text x="700" y="765" text-anchor="middle" font-size="10" fill="#555">ID → 7-char short code</text>
  <text x="700" y="781" text-anchor="middle" font-size="10" fill="#555">[0-9 a-z A-Z]</text>
  <text x="700" y="795" text-anchor="middle" font-size="9" fill="#888">62⁷ ≈ 3.5 trillion URLs</text>

  <!-- arrow: Base62 → DB (store mapping) -->
  <polyline points="590,757 450,757 450,795 300,795" fill="none" stroke="#6c8ebf" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="390" y="750" font-size="10" fill="#6c8ebf">3. store mapping</text>

  <!-- ── NOTE: 301 vs 302 ── -->
  <rect x="60" y="840" width="780" height="55" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="450" y="860" text-anchor="middle" font-size="11" font-weight="bold" fill="#b85450">301 vs 302 Redirect</text>
  <text x="450" y="877" text-anchor="middle" font-size="10" fill="#555">301 Permanent — browser caches redirect, less load on server, but no per-click analytics</text>
  <text x="450" y="892" text-anchor="middle" font-size="10" fill="#555">302 Temporary — every click hits server, enables full analytics tracking</text>

  <!-- ── ARROW MARKERS ── -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#82b366"/>
    </marker>
    <marker id="arrYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d6b656"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9673a6"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b85450"/>
    </marker>
  </defs>

</svg>
